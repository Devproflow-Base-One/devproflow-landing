<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad-base-brand-main-lumina-main" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="50%" stop-color="rgba(34, 197, 94, 0.08)"/>
      <stop offset="100%" stop-color="rgba(34, 197, 94, 0.2)"/>
    </linearGradient>
    <linearGradient id="grad-accent-brand-main-lumina-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#0DDA9B"/>
    </linearGradient>
    <linearGradient id="grad-inner-brand-main-lumina-main" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="grad-glow-brand-main-lumina-main" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#34D399" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grad-glass-brand-main-lumina-main" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow-brand-main-lumina-main" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="shadow-deep-brand-main-lumina-main" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="blur-brand-main-lumina-main" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="blur-sm-brand-main-lumina-main" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="glow-brand-main-lumina-main" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Deep shadow base -->
  <rect x="32" y="40" width="448" height="440" rx="96" fill="#000" opacity="0.3" filter="url(#blur-brand-main-lumina-main)"/>
  <!-- Background tile with gradient -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#grad-base-brand-main-lumina-main)" filter="url(#shadow-brand-main-lumina-main)"/>
  <!-- Glass overlay top half -->
  <rect x="32" y="32" width="448" height="224" rx="96" fill="url(#grad-glass-brand-main-lumina-main)"/>
  <!-- Glow halo -->
  <circle cx="256" cy="256" r="194.56" fill="url(#grad-glow-brand-main-lumina-main)"/>
  <!-- Central motif with glow -->
  <g filter="url(#glow-brand-main-lumina-main)">
    <circle cx="256" cy="256" r="130" fill="url(#grad-accent-brand-main-lumina-main)" opacity="0.9" filter="url(#blur-brand-main-lumina-main)"/><circle cx="256" cy="256" r="100" fill="url(#grad-inner-brand-main-lumina-main)" opacity="0.7"/><circle cx="256" cy="256" r="60" fill="#fff" opacity="0.12"/><circle cx="236" cy="226" r="30" fill="#fff" opacity="0.15" filter="url(#blur-brand-main-lumina-main)"/>
  </g>
  <!-- Inner rim light -->
  <rect x="36" y="36" width="440" height="440" rx="92" fill="none" stroke="rgba(52, 211, 153, 0.15)" stroke-width="1"/>
  <!-- Outer rim light -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="none" stroke="rgba(52, 211, 153, 0.35)" stroke-width="2"/>
  <!-- Top specular highlight -->
  <path d="M80 80 Q256 55 432 80" stroke="#fff" stroke-width="4" fill="none" opacity="0.12" stroke-linecap="round" filter="url(#blur-sm-brand-main-lumina-main)"/>
  <!-- Bottom ambient light -->
  <ellipse cx="256" cy="442" rx="120" ry="20" fill="rgba(52, 211, 153, 0.15)" filter="url(#blur-brand-main-lumina-main)"/>
</svg>